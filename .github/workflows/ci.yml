name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.24.6'
  
jobs:
  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Verify dependencies
      working-directory: cloud-backend
      run: go mod verify

    - name: Check code formatting
      working-directory: cloud-backend
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not properly formatted:"
          gofmt -s -l .
          exit 1
        fi

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin latest

    - name: Run golangci-lint
      working-directory: cloud-backend
      run: golangci-lint run --config .golangci.yml

  # 单元测试
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Run unit tests
      working-directory: cloud-backend
      run: |
        APP_ENV=test go test -short -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Generate coverage report
      working-directory: cloud-backend
      run: |
        go tool cover -func=coverage.out | grep total | awk '{print "Total coverage: " $3}'
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./cloud-backend/coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Archive coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          cloud-backend/coverage.out
          cloud-backend/coverage.html

  # 集成测试
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: ycgcloud_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_DATABASE: ycgcloud_test
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Wait for services
      run: |
        echo "Waiting for MySQL..."
        timeout 60 bash -c 'until mysqladmin ping -h 127.0.0.1 -P 3306 -u test -ptest --silent; do sleep 1; done'
        echo "Waiting for MongoDB..."
        timeout 60 bash -c 'until mongosh --host 127.0.0.1:27017 --eval "db.runCommand({ ping: 1 })" --quiet; do sleep 1; done'
        echo "Waiting for Redis..."
        timeout 60 bash -c 'until redis-cli -h 127.0.0.1 -p 6379 ping; do sleep 1; done'

    - name: Run integration tests
      working-directory: cloud-backend
      env:
        APP_ENV: test
        MYSQL_HOST: 127.0.0.1
        MYSQL_PORT: 3306
        MYSQL_USER: test
        MYSQL_PASSWORD: test
        MYSQL_DATABASE: ycgcloud_test
        MONGODB_URI: mongodb://127.0.0.1:27017
        MONGODB_DATABASE: ycgcloud_test
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
      run: |
        go test -v -tags=integration ./tests/...

  # 构建测试
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Build for Linux
      working-directory: cloud-backend
      run: |
        GOOS=linux GOARCH=amd64 go build -o bin/server-linux cmd/server/main.go

    - name: Build for Windows
      working-directory: cloud-backend
      run: |
        GOOS=windows GOARCH=amd64 go build -o bin/server.exe cmd/server/main.go

    - name: Build for macOS
      working-directory: cloud-backend
      run: |
        GOOS=darwin GOARCH=amd64 go build -o bin/server-darwin cmd/server/main.go

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: cloud-backend/bin/

  # 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Install Gosec
      run: |
        go install github.com/securecodewarrior/gosec/v2/cmd/gosec@latest

    - name: Run Gosec Security Scanner
      working-directory: cloud-backend
      run: |
        gosec -fmt sarif -out gosec.sarif ./... || echo "Gosec completed with findings"

    - name: Upload SARIF file
      if: always() && hashFiles('cloud-backend/gosec.sarif') != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: cloud-backend/gosec.sarif

  # 依赖检查
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Check for vulnerabilities
      working-directory: cloud-backend
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...

    - name: Check dependencies licenses
      working-directory: cloud-backend
      run: |
        go mod download
        go list -m all | head -20

  # 性能测试
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-v17-${{ hashFiles('cloud-backend/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-v17-

    - name: Download dependencies
      working-directory: cloud-backend
      run: go mod download

    - name: Run benchmark tests
      working-directory: cloud-backend
      run: |
        APP_ENV=test go test -bench=. -benchmem ./... | tee benchmark.txt

    - name: Archive benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: cloud-backend/benchmark.txt