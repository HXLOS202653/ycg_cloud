# golangci-lint configuration for YCG Cloud Storage project
# This config follows Go best practices and project standards

# Configuration version (required for golangci-lint v2.x)
version: 2

run:
  # Timeout for analysis, e.g. 30s, 5m.
  timeout: 5m
  
  # Exit code when at least one issue was found.
  issues-exit-code: 1
  
  # Include test files or not.
  tests: true
  
  # Module download mode: readonly, release, vendor, or mod
  modules-download-mode: readonly

# Output configuration options
output:
  # Colored output format
  formats:
    colored-line-number: stdout
  
  # Print lines of code with issue.
  print-issued-lines: true
  
  # Print linter name in the end of issue text.
  print-linter-name: true
  
  # Sort output by file path, line, and column
  sort: true
  
  # Add a prefix to the output file references.
  path-prefix: ""

# Formatters configuration (v2.x feature)
formatters:
  enable:
    - gofmt           # Format Go code
    - goimports       # Format imports
  settings:
    gofmt:
      simplify: true  # Use -s flag for gofmt
    goimports:
      local-prefixes: github.com/HXLOS202653/ycg_cloud

# Linters configuration
linters:
  # Use standard default linters
  default: standard
  
  # Enable additional linters
  enable:
    # Code style linters  
    - misspell        # Find commonly misspelled English words in comments
    - unconvert       # Remove unnecessary type conversions
    - unparam         # Report unused function parameters
    
    # Code quality linters
    - gocyclo         # Compute cyclomatic complexities of functions
    - gocognit        # Compute cognitive complexities of functions
    - goconst         # Find repeated strings that could be replaced by a constant
    - gocritic        # Most opinionated Go source code linter
    - revive          # Fast, configurable, extensible, flexible, and beautiful linter for Go
    
    # Security linters
    - gosec           # Inspect source code for security problems
    
    # Performance linters
    - prealloc        # Find slice declarations that could potentially be pre-allocated
    
    # Error handling linters
    - errname         # Check that sentinel errors are prefixed with the Err and error types are suffixed with the Error
    - errorlint       # Find code that will cause problems with the error wrapping scheme introduced in Go 1.13
    
    # Naming conventions
    - stylecheck      # Replacement for golint

  # Linter settings (moved to linters section in v2.x)
  settings:
  # Settings for errcheck
  errcheck:
    # Report about not checking of errors in type assertions: `a := b.(MyStruct)`.
    check-type-assertions: true
    
    # Report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`.
    check-blank: false
    
    # List of functions to exclude from checking, where each entry is a single function to exclude.
    exclude-functions:
      - io/ioutil.ReadFile
      - io.Copy(*bytes.Buffer)
      - io.Copy(os.Stdout)

  # Settings for gocyclo
  gocyclo:
    # Minimal code complexity to report.
    min-complexity: 15

  # Settings for gocognit
  gocognit:
    # Minimal cognitive complexity to report.
    min-complexity: 20

  # Settings for goconst
  goconst:
    # Minimal length of string constant.
    min-len: 3
    # Minimum occurrences of constant string count to trigger issue.
    min-occurrences: 3
    # Ignore test files.
    ignore-tests: true

  # Settings for gocritic
  gocritic:
    # Which checks should be enabled; can't be combined with 'disabled-checks'.
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
    
    # Which checks should be disabled; can't be combined with 'enabled-tags'.
    disabled-checks:
      - regexpMust
      - whyNoLint
      - commentedOutCode

  # Settings for gosec
  gosec:
    # To select a subset of rules to run.
    includes:
      - G101 # Look for hard coded credentials
      - G102 # Bind to all interfaces
      - G103 # Audit the use of unsafe block
      - G104 # Audit errors not checked
      - G106 # Audit the use of ssh.InsecureIgnoreHostKey
      - G107 # Url provided to HTTP request as taint input
      - G108 # Profiling endpoint automatically exposed on /debug/pprof
      - G109 # Potential Integer overflow made by strconv.Atoi result conversion to int16/32
      - G110 # Potential DoS vulnerability via decompression bomb
      - G201 # SQL query construction using format string
      - G202 # SQL query construction using string concatenation
      - G203 # Use of unescaped data in HTML templates
      - G204 # Audit use of command execution
      - G301 # Poor file permissions used when creating a directory
      - G302 # Poor file permissions used with chmod
      - G303 # Creating tempfile using a predictable path
      - G304 # File path provided as taint input
      - G305 # File traversal when extracting zip/tar archive
      - G306 # Poor file permissions used when writing to a new file
      - G307 # Deferring a method which returns an error
      - G401 # Detect the usage of DES, RC4, MD5 or SHA1
      - G402 # Look for bad TLS connection settings
      - G403 # Ensure minimum RSA key length of 2048 bits
      - G404 # Insecure random number source (rand)
      - G501 # Import blocklist: crypto/md5
      - G502 # Import blocklist: crypto/des
      - G503 # Import blocklist: crypto/rc4
      - G504 # Import blocklist: net/http/cgi
      - G505 # Import blocklist: crypto/sha1
      - G601 # Implicit memory aliasing of items from a range statement

  # Settings for revive
  revive:
    # Maximum number of open files at the same time.
    max-open-files: 2048
    
    # When set to false, ignores files with "GENERATED" header, similar to golint.
    ignore-generated-header: true
    
    # Sets the default severity.
    severity: warning
    
    # Enable all available rules.
    enable-all-rules: false
    
    # Sets the default failure confidence.
    confidence: 0.8
    
    rules:
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  # Settings for stylecheck
  stylecheck:
    # STxxxx checks in https://staticcheck.io/docs/configuration/options/#checks
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]

# Issues configuration (v2.x format)
issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 50
  
  # Maximum count of issues with the same text
  max-same-issues: 3
  
  # Exclude directories
  exclude-dirs:
    - vendor
    - bin
    - tmp
    - .git
  
  # Exclude files
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_gen\\.go$"
    - "wire_gen\\.go$"
  
  # Exclude rules
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
    
    # Exclude known linters from partially hard-to-fix issues
    - path: internal/pkg/
      text: "weak cryptographic primitive"
      linters:
        - gosec
    
    # Exclude some staticcheck messages
    - linters:
        - staticcheck
      text: "SA9003:"
    
    # Exclude lll issues for long lines with go:generate
    - linters:
        - lll
      source: "^//go:generate "
  
  # List of regexps of issue texts to exclude
  exclude:
    # errcheck: Almost all programs ignore errors on these functions and in most cases it's ok
    - Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*print.*|os\.(Un)?Setenv). is not checked
    
    # govet: Common false positives
    - (possible misuse of unsafe.Pointer|should have signature)
    
    # staticcheck: Developers tend to write in C-style with an explicit 'break' in a 'switch', so it's ok to ignore
    - ineffective break statement. Did you mean to break out of the outer loop
    
    # gosec: Too many false-positives on 'unsafe' usage
    - G103
    
    # gosec: Too many false-positives for parametrized shell calls
    - G204
    
    # gosec: Duplicated errcheck checks
    - G104
  
  # Don't use default exclusions
  exclude-use-default: false

severity:
  # Set the default severity for issues.
  default-severity: error
  
  # Set the default severity for issues.
  case-sensitive: false
  
  # Default value is empty list.
  rules:
    - linters:
        - dupl
      severity: info