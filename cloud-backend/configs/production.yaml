# 生产环境配置文件
app:
  name: "ycg-cloud"
  version: "1.0.0"
  environment: "production"
  debug: false

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

database:
  # MySQL 8.0.31 配置
  mysql:
    host: "${MYSQL_HOST}"
    port: ${MYSQL_PORT}
    username: "${MYSQL_USER}"
    password: "${MYSQL_PASSWORD}"
    database: "${MYSQL_DATABASE}"
    charset: "utf8mb4"
    parse_time: true
    loc: "Local"
    timeout: "10s"
    read_timeout: "30s"
    write_timeout: "30s"
    max_open_conns: 100
    max_idle_conns: 10
    conn_max_lifetime: "1h"
    conn_max_idle_time: "10m"

  # MongoDB 配置
  mongodb:
    uri: "${MONGODB_URI}"
    database: "${MONGODB_DATABASE}"
    username: "${MONGODB_USER}"
    password: "${MONGODB_PASSWORD}"
    connect_timeout: "10s"
    socket_timeout: "30s"
    server_sel_timeout: "30s"
    max_pool_size: 100
    min_pool_size: 5
    max_idle_time_ms: 300000

  # Redis 7.0+ 配置
  redis:
    host: "${REDIS_HOST}"
    port: ${REDIS_PORT}
    password: "${REDIS_PASSWORD}"
    db: 0
    username: "default"
    pool_size: 20
    min_idle_conns: 5
    max_conn_age: "1h"
    pool_timeout: "4s"
    idle_timeout: "5m"
    idle_check_freq: "1m"
    dial_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"

  max_conns: 100
  max_idle: 10

storage:
  type: "local"
  chunk_size: 5242880
  local:
    path: "./storage"

auth:
  jwt_secret: "your-secret-key-change-in-production"
  token_expiry: "24h"
  refresh_expiry: "168h"
  bcrypt_cost: 12

log:
  level: "info"
  format: "json"
  output: "stdout"

monitor:
  enabled: true
  metrics_url: "/metrics"