# 开发环境配置文件
app:
  name: "ycg-cloud"
  version: "1.0.0"
  environment: "development"
  debug: true

server:
  host: "localhost"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

database:
  # MySQL 8.0.31 配置 - 开发环境使用远程数据库
  mysql:
    host: "dbconn.sealosbja.site"
    port: 36973
    username: "root"
    password: "hxl202653"
    database: "ycgcloud_dev"
    charset: "utf8mb4"
    parse_time: true
    loc: "Local"
    timeout: "10s"
    read_timeout: "30s"
    write_timeout: "30s"
    max_open_conns: 50
    max_idle_conns: 5
    conn_max_lifetime: "1h"
    conn_max_idle_time: "10m"

  # MongoDB 6.0 配置
  mongodb:
    uri: "mongodb://root:hxl202653@dbconn.sealosbja.site:42033/?directConnection=true"
    database: "ycgcloud_dev"
    username: "root"
    password: "hxl202653"
    connect_timeout: "10s"
    socket_timeout: "30s"
    server_sel_timeout: "30s"
    max_pool_size: 50
    min_pool_size: 3
    max_idle_time_ms: 300000

  # Redis 7.0+ 配置
  redis:
    host: "dbconn.sealosbja.site"
    port: 49169
    password: "jdsj6j67"
    db: 1  # 使用不同的数据库号区分开发环境
    username: "default"
    pool_size: 10
    min_idle_conns: 3
    max_conn_age: "1h"
    pool_timeout: "4s"
    idle_timeout: "5m"
    idle_check_freq: "1m"
    dial_timeout: "5s"
    read_timeout: "3s"
    write_timeout: "3s"

  max_conns: 50
  max_idle: 5

storage:
  type: "local"
  chunk_size: 5242880
  local:
    path: "./storage"

auth:
  jwt_secret: "dev-secret-key-not-for-production"
  token_expiry: "24h"
  refresh_expiry: "168h"
  bcrypt_cost: 10  # 开发环境使用较低的成本

log:
  level: "debug"
  format: "text"
  output: "stdout"

monitor:
  enabled: true
  metrics_url: "/metrics"